services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whatsapp
      POSTGRES_PASSWORD: whatsapp
      POSTGRES_DB: whatsapp_sender
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp -d whatsapp_sender"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3010:3010"
    environment:
      DATABASE_URL: postgresql://whatsapp:whatsapp@postgres:5432/whatsapp_sender
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-min-32-characters-long}
      CORS_ORIGIN: http://localhost:3011
      API_PORT: 3010
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://whatsapp:whatsapp@postgres:5432/whatsapp_sender
      REDIS_URL: redis://redis:6379
      BAILEYS_MOCK: ${BAILEYS_MOCK:-0}
      WORKER_CONCURRENCY: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3011:3011"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3010
    depends_on:
      - api

volumes:
  pgdata:
