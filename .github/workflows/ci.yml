name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: whatsapp
          POSTGRES_PASSWORD: whatsapp
          POSTGRES_DB: whatsapp_sender
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U whatsapp -d whatsapp_sender"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://whatsapp:whatsapp@localhost:5432/whatsapp_sender
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-minimum-32-characters
      BAILEYS_MOCK: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Push schema
        run: npm run db:push

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
