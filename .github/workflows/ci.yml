name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: whatsapp
          POSTGRES_PASSWORD: whatsapp
          POSTGRES_DB: whatsapp_sender
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U whatsapp -d whatsapp_sender"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      CI: "true"
      DATABASE_URL: postgresql://whatsapp:whatsapp@localhost:5432/whatsapp_sender
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-minimum-32-characters
      BAILEYS_MOCK: "1"
      NEXT_PUBLIC_API_URL: https://api.whatsapp.arheb.net
      NEXT_PUBLIC_WEB_URL: https://whatsapp.arheb.net

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Full system check (build + test + DI bootstrap)
        run: bash scripts/ci-check.sh

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_API_URL: https://api.whatsapp.arheb.net
      NEXT_PUBLIC_WEB_URL: https://whatsapp.arheb.net
      JWT_SECRET: ci-jwt-secret-minimum-32-characters
      POSTGRES_PASSWORD: whatsapp
      DATABASE_URL: postgresql://whatsapp:whatsapp@postgres:5432/whatsapp_sender
      REDIS_URL: redis://redis:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production images (api, worker, web)
        run: bash scripts/ci-docker.sh
