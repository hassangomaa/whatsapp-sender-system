# WhatsApp Sender — Nginx site for arheb.net
# Install:
#   sudo cp nginx/whatsapp-sender.conf /etc/nginx/sites-available/whatsapp-sender
#   sudo ln -sf /etc/nginx/sites-available/whatsapp-sender /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d whatsapp.arheb.net -d api.whatsapp.arheb.net

# Dashboard — whatsapp.arheb.net
server {
  listen 80;
  server_name whatsapp.arheb.net;

  location / {
    proxy_pass http://127.0.0.1:3011;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# API — api.whatsapp.arheb.net
server {
  listen 80;
  server_name api.whatsapp.arheb.net;

  location / {
    proxy_pass http://127.0.0.1:3010;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # SSE for QR stream
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }
}
