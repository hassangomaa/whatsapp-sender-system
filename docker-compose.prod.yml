# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml
services:
  postgres:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whatsapp}
    restart: unless-stopped

  redis:
    ports: !reset []
    restart: unless-stopped

  api:
    ports:
      - "127.0.0.1:3010:3010"
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      API_PORT: 3010
    restart: unless-stopped

  worker:
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BAILEYS_MOCK: "0"
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
    volumes:
      - baileys_sessions:/app/apps/worker/sessions
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL}
    ports:
      - "127.0.0.1:3011:3011"
    env_file: .env
    restart: unless-stopped

volumes:
  baileys_sessions:
